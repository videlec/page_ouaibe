<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="author" content="Vincent Delecroix">
<title>{% block title %}Vincent Delecroix{% endblock %}</title>
<meta name="description" content="{% block description %}Page personnelle de Vincent Delecroix, mathématicien et informaticien, directeur de recherche CNRS au LaBRI à Bordeaux. Combinatoire, théorie des nombres, géométrie et systèmes dynamiques.{% endblock %}">
<link rel="canonical" href="{{ site_url }}{{ canonical_path }}">

<meta property="og:type" content="{% block og_type %}website{% endblock %}">
<meta property="og:title" content="{{ self.title() }}">
<meta property="og:description" content="{{ self.description() }}">
<meta property="og:url" content="{{ site_url }}{{ canonical_path }}">
<meta property="og:image" content="{{ site_url }}photo.jpg">
<meta property="og:locale" content="fr_FR">
<meta name="twitter:card" content="summary">

<link rel="stylesheet" type="text/css" href="style.css">
{% block extra_header %}{% endblock %}
{% block structured_data %}{% endblock %}
</head>

<body>

<div id="photo"> <img src="photo.jpg" alt="Vincent Delecroix"/> </div>

<div id="left">
<h1> Vincent Delecroix </h1>
<hr>

<div id="menu">
<ul>
{% for page in pages %}
<li>
<span class="{{ page.status }}">
<a href="{{ page.link }}">
{{ page.name }}
</a></span>
</li>
{% endfor %}
</ul>
</div>  <!-- end menu -->

<div id="main">
{% block body %}
My body
{% endblock %}
</div>
</div>  <!-- end left -->

</body>
</html>
